# Location Spoofer Defense - gps.conf
# 关闭 A-GPS 网络辅助，强制独立定位模式

# NTP 服务器指向本地（关闭网络时间同步对 GPS 的纠偏）
NTP_SERVER=127.0.0.1

# SUPL 服务器指向本地（关闭辅助定位）
SUPL_HOST=127.0.0.1
SUPL_PORT=7275

# 关闭 SUPL 辅助
SUPL_TLS_HOST=
SUPL_TLS_CERT=
SUPL_NO_SECURE_SOCKET=true

# 强制独立定位模式（不依赖网络辅助）
A_GLONASS_POS_PROTOCOL_SELECT=0
LPP_PROFILE=0

# 关闭 XTRA 辅助数据下载（AGPS 星历数据）
XTRA_SERVER_1=
XTRA_SERVER_2=
XTRA_SERVER_3=

# 关闭 WiFi 和 Cell 辅助定位
INTERMEDIATE_POS=
CAPABILITIES=0
